    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #050505; color: #fff; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-card {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .glass-card:hover {
            border-color: rgba(34, 197, 94, 0.25);
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.05);
            transform: translateY(-4px);
        }

        .gradient-text {
            background: linear-gradient(to right, #e5e5e5, #a3a3a3, #525252);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .green-glow {
            background: linear-gradient(to right, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
            top: -200px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }
        .hero-glow-2 {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(64, 64, 64, 0.15) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
        }

        .section-glow {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.04) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .input-field {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(34, 197, 94, 0.4);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.08);
        }
        .input-field::placeholder { color: #525252; }

        .btn-primary {
            background: #22c55e;
            color: #fff;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            background: #16a34a;
            transform: scale(1.02);
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .result-panel {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(10, 10, 10, 0.8) 100%);
            border: 1px solid rgba(34, 197, 94, 0.15);
            display: none;
        }
        .result-panel.show { display: block; animation: fadeUp 0.5s ease forwards; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-slow { animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        .tag {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .nav-link { color: #a3a3a3; transition: color 0.3s ease; }
        .nav-link:hover { color: #fff; }

        .service-link {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .service-link:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(34, 197, 94, 0.2);
            transform: translateY(-2px);
        }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            z-index: 9999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        .mobile-menu {
            max-height: 0; overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .mobile-menu.open { max-height: 500px; }

        .category-badge {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(34, 197, 94, 0.05) 100%);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
        }
    </style>
</head>
